name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck server
        run: npx tsc --noEmit -p apps/server/tsconfig.json

      - name: Typecheck mobile
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json

  # ── Tier 1: Unit + Integration Tests (Vitest) ──────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        working-directory: apps/server

  # ── Tier 2: Browser E2E Tests (Playwright) ─────────────────────────────────
  e2e:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [typecheck, test]   # only run if type checks and unit tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      - name: Run E2E tests
        run: npm test
        working-directory: apps/e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

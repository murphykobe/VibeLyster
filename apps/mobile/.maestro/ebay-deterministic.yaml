appId: com.vibelyster.app
---
- launchApp:
    clearState: true
- openLink: "exp+vibelyster://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8083"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
- runFlow:
    when:
      visible: "Go to app"
    commands:
      - tapOn: "Go to app"
- extendedWaitUntil:
    visible: "Closet"
    timeout: 180000
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
- runFlow:
    when:
      visible: "Go to app"
    commands:
      - tapOn: "Go to app"
- extendedWaitUntil:
    visible: "Settings, tab, 2 of 2"
    timeout: 30000
- tapOn: "Settings, tab, 2 of 2"
- assertVisible: "Account & Connections"
- tapOn:
    id: "platform-connect-ebay"
- assertVisible: "Connect eBay"
- openLink: "vibelyster://connect/ebay?code=mock-ebay-authorization-code&state=maestro-ebay-state"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- runFlow:
    when:
      visible: "Connect eBay"
    commands:
      - tapOn: "Close"
- extendedWaitUntil:
    visible: "Account & Connections"
    timeout: 15000
- assertVisible: "Account & Connections"
- assertVisible: "Disconnect"

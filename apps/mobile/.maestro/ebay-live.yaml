appId: com.vibelyster.app
env:
  CLERK_EMAIL: ${MAESTRO_CLERK_TEST_EMAIL}
  CLERK_PASSWORD: ${MAESTRO_CLERK_TEST_PASSWORD}
  EBAY_USERNAME: ${MAESTRO_EBAY_SANDBOX_USERNAME}
  EBAY_PASSWORD: ${MAESTRO_EBAY_SANDBOX_PASSWORD}
---
- launchApp:
    clearState: true
- openLink: "exp+vibelyster://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8084"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
- runFlow:
    when:
      visible: "Close"
    commands:
      - tapOn: "Close"
- runFlow:
    when:
      visible: "Sign in to your account"
    commands:
      - tapOn:
          id: "sign-in-email"
      - inputText: ${CLERK_EMAIL}
      - tapOn:
          id: "sign-in-password"
      - inputText: ${CLERK_PASSWORD}
      - pressKey: Enter
- extendedWaitUntil:
    visible: "Settings, tab, 2 of 2"
    timeout: 30000
- tapOn: "Settings, tab, 2 of 2"
- assertVisible: "Account & Connections"
- runFlow:
    when:
      visible:
        id: "platform-disconnect-ebay"
    commands:
      - tapOn:
          id: "platform-disconnect-ebay"
      - runFlow:
          when:
            visible: "Disconnect ebay"
          commands:
            - tapOn:
                text: "Disconnect"
                index: 0
- extendedWaitUntil:
    visible:
      id: "platform-connect-ebay"
    timeout: 15000
- tapOn:
    id: "platform-connect-ebay"
- assertVisible: "Connect eBay"
# eBay sandbox login — conditional because prior session may auto-consent
- runFlow:
    when:
      visible: "Email or username"
    commands:
      - tapOn: "Email or username"
      - inputText: ${EBAY_USERNAME}
      - tapOn: "Continue"
      - tapOn: "Password"
      - inputText: ${EBAY_PASSWORD}
      - tapOn: "Sign in"
- runFlow:
    when:
      visible: "Agree and Continue"
    commands:
      - tapOn: "Agree and Continue"
- runFlow:
    when:
      visible: "Open"
    commands:
      - tapOn: "Open"
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- assertVisible: "Account & Connections"
- assertVisible: "Disconnect"
